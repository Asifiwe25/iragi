<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="goldGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#F0D060;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C9A84C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A8892A;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="goldGrad2" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#F5D870;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B6B20;stop-opacity:1" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dotted circle -->
  <g opacity="0.85">
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="40s" repeatCount="indefinite"/>
    <!-- Generate dots around circle radius 155 -->
    <circle cx="200" cy="45" r="3.5" fill="url(#goldGrad)"/>
    <circle cx="226" cy="46" r="2.5" fill="url(#goldGrad)"/>
    <circle cx="251" cy="50" r="3" fill="url(#goldGrad)"/>
    <circle cx="274" cy="58" r="2.5" fill="url(#goldGrad)"/>
    <circle cx="295" cy="69" r="3.5" fill="url(#goldGrad)"/>
    <circle cx="314" cy="83" r="2.5" fill="url(#goldGrad)"/>
    <circle cx="330" cy="99" r="3" fill="url(#goldGrad)"/>
    <circle cx="344" cy="117" r="2" fill="url(#goldGrad)"/>
    <circle cx="354" cy="137" r="3.5" fill="url(#goldGrad)"/>
    <circle cx="361" cy="158" r="2.5" fill="url(#goldGrad)"/>
    <circle cx="364" cy="180" r="3" fill="url(#goldGrad)"/>
    <circle cx="364" cy="202" r="2" fill="url(#goldGrad)"/>
    <circle cx="361" cy="224" r="3.5" fill="url(#goldGrad)"/>
    <circle cx="354" cy="245" r="2.5" fill="url(#goldGrad)"/>
    <circle cx="344" cy="265" r="3" fill="url(#goldGrad)"/>
    <circle cx="330" cy="283" r="2" fill="url(#goldGrad)"/>
    <circle cx="314" cy="299" r="3.5" fill="url(#goldGrad)"/>
    <circle cx="295" cy="313" r="2.5" fill="url(#goldGrad)"/>
    <circle cx="274" cy="324" r="3" fill="url(#goldGrad)"/>
    <circle cx="251" cy="332" r="2" fill="url(#goldGrad)"/>
    <circle cx="226" cy="336" r="3.5" fill="url(#goldGrad)"/>
    <circle cx="200" cy="337" r="2.5" fill="url(#goldGrad)"/>
    <circle cx="174" cy="336" r="3" fill="url(#goldGrad)"/>
    <circle cx="149" cy="332" r="2" fill="url(#goldGrad)"/>
    <circle cx="126" cy="324" r="3.5" fill="url(#goldGrad)"/>
    <circle cx="105" cy="313" r="2.5" fill="url(#goldGrad)"/>
    <circle cx="86" cy="299" r="3" fill="url(#goldGrad)"/>
    <circle cx="70" cy="283" r="2" fill="url(#goldGrad)"/>
    <circle cx="56" cy="265" r="3.5" fill="url(#goldGrad)"/>
    <circle cx="46" cy="245" r="2.5" fill="url(#goldGrad)"/>
    <circle cx="39" cy="224" r="3" fill="url(#goldGrad)"/>
    <circle cx="36" cy="202" r="2" fill="url(#goldGrad)"/>
    <circle cx="36" cy="180" r="3.5" fill="url(#goldGrad)"/>
    <circle cx="39" cy="158" r="2.5" fill="url(#goldGrad)"/>
    <circle cx="46" cy="137" r="3" fill="url(#goldGrad)"/>
    <circle cx="56" cy="117" r="2" fill="url(#goldGrad)"/>
    <circle cx="70" cy="99" r="3.5" fill="url(#goldGrad)"/>
    <circle cx="86" cy="83" r="2.5" fill="url(#goldGrad)"/>
    <circle cx="105" cy="69" r="3" fill="url(#goldGrad)"/>
    <circle cx="126" cy="58" r="2" fill="url(#goldGrad)"/>
    <circle cx="149" cy="50" r="3.5" fill="url(#goldGrad)"/>
    <circle cx="174" cy="46" r="2.5" fill="url(#goldGrad)"/>
  </g>

  <!-- Flower/leaf symbol - 4 petals -->
  <g transform="translate(200, 148) rotate(-15)" filter="url(#glow)">
    <!-- Petal 1 top-right -->
    <path d="M0,0 C10,-30 35,-45 30,-65 C25,-45 5,-30 0,0 Z" fill="url(#goldGrad2)" transform="rotate(0)"/>
    <!-- Petal 2 bottom-right -->
    <path d="M0,0 C30,-10 48,-30 68,-28 C48,-22 30,-5 0,0 Z" fill="url(#goldGrad2)" transform="rotate(90)"/>
    <!-- Petal 3 bottom-left -->
    <path d="M0,0 C-10,30 -35,45 -30,65 C-25,45 -5,30 0,0 Z" fill="url(#goldGrad2)" transform="rotate(180)"/>
    <!-- Petal 4 top-left -->
    <path d="M0,0 C-30,10 -48,30 -68,28 C-48,22 -30,5 0,0 Z" fill="url(#goldGrad2)" transform="rotate(270)"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="5" fill="url(#goldGrad)"/>
  </g>

  <!-- "iragi" script text -->
  <text x="200" y="252" 
    font-family="'Dancing Script', 'Pacifico', cursive" 
    font-size="72" 
    font-weight="400"
    fill="url(#goldGrad2)"
    text-anchor="middle"
    filter="url(#glow)">iragi</text>

  <!-- Underline flourish -->
  <path d="M 145 270 Q 200 285 255 270" 
    stroke="url(#goldGrad)" stroke-width="1.5" 
    fill="none" opacity="0.7"/>

  <!-- Tagline -->
  <text x="200" y="320" 
    font-family="Arial, sans-serif" 
    font-size="11" 
    font-weight="400"
    fill="url(#goldGrad)"
    text-anchor="middle"
    letter-spacing="3">ENSEMBLE, NOUS BÂTISSONS L'ESPOIR.</text>
</svg>
